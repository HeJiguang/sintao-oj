services:
  oj-mysql-server:
    image: mysql:5.7
    container_name: oj-mysql-server
    environment:
      TZ: Asia/Shanghai
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-change-me-local}
    ports:
      - "3306:3306"
    volumes:
      - ./mysql/mysqldata/:/var/lib/mysql/
    command:
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_general_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-change-me-local}"]
      interval: 10s
      timeout: 5s
      retries: 10

  oj-nacos-server:
    image: nacos/nacos-server:v2.2.2
    container_name: oj-nacos-server
    environment:
      - MODE=standalone
      - JVM_XMS=256m
      - JVM_XMX=256m
      - SPRING_DATASOURCE_PLATFORM=mysql
      - MYSQL_SERVICE_HOST=oj-mysql-server
      - MYSQL_SERVICE_PORT=3306
      - MYSQL_SERVICE_DB_NAME=bitoj_nacos_local
      - MYSQL_SERVICE_USER=ojtest
      - MYSQL_SERVICE_PASSWORD=${MYSQL_SERVICE_PASSWORD:-change-me-local}
    volumes:
      - ./nacos/conf/application.properties:/home/nacos/conf/application.properties
    ports:
      - "8848:8848"
      - "9848:9848"
    depends_on:
      oj-mysql-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8848/nacos"]
      interval: 30s
      timeout: 10s
      retries: 10

  oj-xxl-job-server:
    container_name: oj-xxl-job-server
    image: xuxueli/xxl-job-admin:2.4.0
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://oj-mysql-server:3306/xxl_job?useUnicode=true&characterEncoding=UTF-8&autoReconnect=true&serverTimezone=Asia/Shanghai
      - SPRING_DATASOURCE_USERNAME=ojtest
      - SPRING_DATASOURCE_PASSWORD=${MYSQL_SERVICE_PASSWORD:-change-me-local}
    ports:
      - "8080:8080"
    depends_on:
      oj-mysql-server:
        condition: service_healthy

  oj-redis-server:
    container_name: oj-redis-server
    image: redis:latest
    ports:
      - "6379:6379"
    volumes:
      - ./redis/data:/data
    environment:
      REQUIREPASS: ${REDIS_PASSWORD:-change-me-local}
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  oj-gateway:
    image: bit/oj-gateway:0.0.1-SNAPSHOT
    build:
      context: ./bitoj-jar/gateway/
    container_name: oj-gateway
    environment:
      TZ: Asia/Shanghai
      HOST_IP: ${HOST_IP:-127.0.0.1}
      NACOS_SERVER_ADDR: http://oj-nacos-server:8848
    ports:
      - "19090:19090"
    privileged: true
    depends_on:
      oj-nacos-server:
        condition: service_healthy
      oj-redis-server:
        condition: service_healthy

  syncode-app:
    build:
      context: ../..
      dockerfile: deploy/test/frontend/app.Dockerfile
    container_name: syncode-app
    environment:
      TZ: Asia/Shanghai
      SYNCODE_BACKEND_BASE_URL: http://oj-gateway:19090
      NEXT_PUBLIC_BACKEND_BASE_URL: ${NEXT_PUBLIC_BACKEND_BASE_URL:-http://localhost:19090}
    ports:
      - "4001:4001"
    depends_on:
      oj-gateway:
        condition: service_started

  syncode-admin:
    build:
      context: ../..
      dockerfile: deploy/test/frontend/admin.Dockerfile
    container_name: syncode-admin
    environment:
      TZ: Asia/Shanghai
      SYNCODE_BACKEND_BASE_URL: http://oj-gateway:19090
      NEXT_PUBLIC_BACKEND_BASE_URL: ${NEXT_PUBLIC_BACKEND_BASE_URL:-http://localhost:19090}
    ports:
      - "4002:4002"
    depends_on:
      oj-gateway:
        condition: service_started

  syncode-web:
    build:
      context: ../..
      dockerfile: deploy/test/frontend/web.Dockerfile
    container_name: syncode-web
    environment:
      TZ: Asia/Shanghai
      APP_URL: http://syncode-app:4001
      ADMIN_URL: http://syncode-admin:4002
    ports:
      - "4000:4000"
    depends_on:
      syncode-app:
        condition: service_started
      syncode-admin:
        condition: service_started

  oj-nginx-server:
    image: nginx:1.21
    container_name: oj-nginx-server
    volumes:
      - ./nginx/conf/default.conf:/etc/nginx/conf.d/default.conf
    environment:
      TZ: Asia/Shanghai
    ports:
      - "80:80"
      - "10030:10030"
      - "443:443"
    privileged: true
    depends_on:
      - oj-gateway
      - syncode-web
      - syncode-app
      - syncode-admin

  oj-elasticsearch-server:
    container_name: oj-elasticsearch-server
    image: elasticsearch:8.5.3
    ports:
      - "9200:9200"
    volumes:
      - ./elasticsearch/es-plugins:/usr/share/elasticsearch/plugins
    environment:
      discovery.type: single-node
      ES_JAVA_OPTS: "-Xms256m -Xmx256m"
      xpack.security.enabled: false
    healthcheck:
      test: ["CMD", "curl", "-s", "http://localhost:9200/_cluster/health?wait_for_status=green&timeout=1s"]
      interval: 30s
      timeout: 5s
      retries: 10

  oj-qdrant-server:
    container_name: oj-qdrant-server
    image: qdrant/qdrant:v1.13.4
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./qdrant/storage:/qdrant/storage
    environment:
      QDRANT__SERVICE__HTTP_PORT: 6333
      QDRANT__SERVICE__GRPC_PORT: 6334

  oj-kibana-server:
    image: kibana:8.5.3
    container_name: oj-kibana-server
    ports:
      - "10010:5601"
    depends_on:
      oj-elasticsearch-server:
        condition: service_healthy
    environment:
      I18N_LOCALE: zh-CN
      ELASTICSEARCH_URL: http://elasticsearch:9200

  oj-rabbitMQ-server:
    container_name: oj-rabbitMQ-server
    image: rabbitmq:3.8.30-management
    ports:
      - "5672:5672"
      - "10020:15672"
    volumes:
      - ./rabbit/data:/var/lib/rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 30s
      timeout: 10s
      retries: 10

  oj-system:
    image: bit/oj-system:0.0.1-SNAPSHOT
    build:
      context: ./bitoj-jar/system/
    container_name: oj-system
    environment:
      TZ: Asia/Shanghai
      HOST_IP: ${HOST_IP:-127.0.0.1}
      NACOS_SERVER_ADDR: http://oj-nacos-server:8848
    ports:
      - "9201:9201"
    privileged: true
    depends_on:
      oj-nacos-server:
        condition: service_healthy
      oj-redis-server:
        condition: service_healthy
      oj-elasticsearch-server:
        condition: service_healthy

  oj-friend:
    image: bit/oj-friend:0.0.1-SNAPSHOT
    build:
      context: ./bitoj-jar/friend/
    container_name: oj-friend
    environment:
      TZ: Asia/Shanghai
      HOST_IP: ${HOST_IP:-127.0.0.1}
      NACOS_SERVER_ADDR: http://oj-nacos-server:8848
    ports:
      - "9202:9202"
    privileged: true
    depends_on:
      oj-nacos-server:
        condition: service_healthy
      oj-redis-server:
        condition: service_healthy
      oj-elasticsearch-server:
        condition: service_healthy
      oj-rabbitMQ-server:
        condition: service_healthy

  oj-job:
    image: bit/oj-job:0.0.1-SNAPSHOT
    build:
      context: ./bitoj-jar/job/
    container_name: oj-job
    environment:
      TZ: Asia/Shanghai
      HOST_IP: ${HOST_IP:-127.0.0.1}
      NACOS_SERVER_ADDR: http://oj-nacos-server:8848
    ports:
      - "9203:9203"
    privileged: true
    depends_on:
      oj-nacos-server:
        condition: service_healthy
      oj-redis-server:
        condition: service_healthy

  oj-judge:
    image: bit/oj-judge:0.0.1-SNAPSHOT
    build:
      context: ./bitoj-jar/judge/
    container_name: oj-judge
    volumes:
      - user-code-pool:/user-code-pool
    environment:
      TZ: Asia/Shanghai
      HOST_IP: ${HOST_IP:-127.0.0.1}
      NACOS_SERVER_ADDR: http://oj-nacos-server:8848
    privileged: true
    depends_on:
      oj-nacos-server:
        condition: service_healthy
      oj-rabbitMQ-server:
        condition: service_healthy

volumes:
  user-code-pool:
