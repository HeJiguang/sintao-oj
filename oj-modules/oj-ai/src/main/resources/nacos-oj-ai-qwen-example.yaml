# Nacos 配置示例：oj-ai 使用通义千问（Qwen / 阿里云 DashScope）
# 在 Nacos 中创建配置，Data ID 与 bootstrap 中 spring.cloud.nacos.config.file-extension 一致（如 oj-ai.yaml），Group 与当前一致，将下面内容粘贴并修改 api-key。
# 通义千问提供 OpenAI 兼容接口，Chat 与 Embedding 均可用，可开启 RAG（spring.ai.rag.enabled: true）。

server:
  port: 9205

jwt:
  secret: ${JWT_SECRET:change-me-local-jwt-secret}

spring:
  ai:
    openai:
      # 重要：base-url 不要带 /v1，否则 Chat 会拼成 .../v1/v1/chat/completions、Embedding 会拼成 .../v1/v1/embeddings 导致 404
      base-url: https://dashscope.aliyuncs.com/compatible-mode
      # 请在阿里云百炼控制台获取 API-KEY，替换下面的占位
      api-key: ${DASHSCOPE_API_KEY:your-dashscope-api-key}
      chat:
        options:
          # 可选：qwen-turbo / qwen-plus / qwen-max / qwen3.5-7b 等，按需选择
          model: qwen-turbo
      # 重要：embedding 的 base-url 不要带 /v1，否则会拼成 .../v1/v1/embeddings；模型必须用通义的 text-embedding-v4（不能用 OpenAI 的 text-embedding-ada-002）
      embedding:
        base-url: https://dashscope.aliyuncs.com/compatible-mode
        options:
          model: text-embedding-v4
  # 使用 Qwen 时可开启 RAG（算法资料检索）
  # ai:
  #   rag:
  #     enabled: true
