version: '3.8'

services:
  oj-mysql-server:
    image: mysql:5.7
    container_name: oj-mysql-server
    environment:
      TZ: Asia/Shanghai
      MYSQL_ROOT_PASSWORD: change-me-local
      MYSQL_DATABASE: bitoj_dev
    ports:
      - "3306:3306"
    volumes:
      - ./deploy/dev/mysql/mysqldata:/var/lib/mysql
      - ./deploy/dev/sql/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    command:
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_general_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-u", "root", "-pchange-me-local"]
      interval: 10s
      timeout: 5s
      retries: 10

  oj-redis-server:
    container_name: oj-redis-server
    image: redis:latest
    ports:
      - "16379:6379"
    volumes:
      - ./deploy/dev/redis/data:/data
    environment:
      REQUIREPASS: change-me-local
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "change-me-local", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  oj-rabbitmq-server:
    container_name: oj-rabbitmq-server
    image: rabbitmq:3.8.30-management
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - ./deploy/dev/rabbit/data:/var/lib/rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: change-me-local
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 30s
      timeout: 10s
      retries: 10

  oj-elasticsearch-server:
    container_name: oj-elasticsearch-server
    image: elasticsearch:8.5.3
    ports:
      - "9200:9200"
    volumes:
      - ./deploy/dev/elasticSearch/es-plugins:/usr/share/elasticsearch/plugins
    environment:
      discovery.type: single-node
      ES_JAVA_OPTS: "-Xms256m -Xmx256m"
      xpack.security.enabled: false
    healthcheck:
      test: ["CMD", "curl", "-s", "http://localhost:9200/_cluster/health?wait_for_status=green&timeout=1s"]
      interval: 30s
      timeout: 5s
      retries: 10

  # 可选：Nacos服务发现和配置中心（根据local-env.example.ps1默认禁用）
  # oj-nacos-server:
  #   image: nacos/nacos-server:v2.2.2
