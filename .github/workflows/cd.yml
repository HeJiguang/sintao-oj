name: cd

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Optional image tag override, for example sha-abc123def456
        required: false
        type: string
      source_run_id:
        description: Optional CI run id that contains the deploy bundle artifact
        required: false
        type: string

concurrency:
  group: cd-prod
  cancel-in-progress: false

permissions:
  actions: read
  contents: read

env:
  STACK_NAME: onlineoj-prod
  STACK_ENV_FILE: deploy/prod/env/stack.env
  RUNTIME_ENV_FILE: deploy/prod/env/runtime.env
  RUNNER_WORKER_SSH_KEY_FILE: /opt/syncode-runner/.ssh/onlineoj_worker_ci

jobs:
  release:
    name: Build And Deploy On Manager
    runs-on:
      - self-hosted
      - linux
      - x64
      - syncode-prod
    steps:
      - name: Resolve deploy metadata
        id: meta
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          source_run_id="${{ github.event.inputs.source_run_id }}"
          if [[ -z "${source_run_id}" ]]; then
            source_run_id="$(gh api "repos/${{ github.repository }}/actions/workflows/ci.yml/runs?branch=main&status=success&per_page=1" --jq '.workflow_runs[0].id')"
          fi

          source_sha="$(gh api "repos/${{ github.repository }}/actions/runs/${source_run_id}" --jq '.head_sha')"

          if [[ -n "${{ github.event.inputs.image_tag }}" ]]; then
            image_tag="${{ github.event.inputs.image_tag }}"
          else
            image_tag="sha-${source_sha::12}"
          fi

          echo "source_sha=${source_sha}" >> "$GITHUB_OUTPUT"
          echo "source_run_id=${source_run_id}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${image_tag}" >> "$GITHUB_OUTPUT"
          echo "artifact_name=deploy-source-${source_sha}" >> "$GITHUB_OUTPUT"

      - name: Download deploy bundle
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          rm -rf source-bundle
          mkdir -p source-bundle
          gh run download "${{ steps.meta.outputs.source_run_id }}" \
            --repo "${{ github.repository }}" \
            --name "${{ steps.meta.outputs.artifact_name }}" \
            --dir source-bundle

      - name: Extract deploy bundle
        shell: bash
        run: |
          rm -rf repo
          mkdir -p repo
          tar xzf source-bundle/deploy-source.tar.gz -C repo

      - name: Prepare runtime env files
        shell: bash
        run: |
          cd repo
          printf '%s\n' "${{ secrets.STACK_ENV_PROD }}" > "${STACK_ENV_FILE}"
          printf '%s\n' "${{ secrets.RUNTIME_ENV_PROD }}" > "${RUNTIME_ENV_FILE}"
          sed -i "s#sha-REPLACE_ME#${{ steps.meta.outputs.image_tag }}#g" "${STACK_ENV_FILE}"

      - name: Prepare worker SSH key
        shell: bash
        run: |
          mkdir -p repo/.cd-tmp
          if [[ -f "${RUNNER_WORKER_SSH_KEY_FILE}" ]]; then
            install -m 600 "${RUNNER_WORKER_SSH_KEY_FILE}" repo/.cd-tmp/worker_id_ed25519
          elif [[ -n "${{ secrets.WORKER_SSH_KEY }}" ]]; then
            printf '%s\n' "${{ secrets.WORKER_SSH_KEY }}" > repo/.cd-tmp/worker_id_ed25519
          else
            echo "worker ssh key is not available on runner or in GitHub secrets" >&2
            exit 1
          fi
          chmod 600 repo/.cd-tmp/worker_id_ed25519

      - name: Verify manager toolchain
        shell: bash
        run: |
          java -version
          mvn -version
          docker version
          docker info

      - name: Build and deploy locally
        shell: bash
        run: |
          cd repo
          chmod +x deploy/prod/scripts/build-images.sh
          chmod +x deploy/prod/scripts/sync-worker-images.sh
          chmod +x deploy/prod/scripts/deploy.sh
          BUILD_LOCAL_IMAGES=true \
          SYNC_WORKER_IMAGES=true \
          WORKER_SSH_KEY_FILE=.cd-tmp/worker_id_ed25519 \
          STACK_ENV_FILE="${STACK_ENV_FILE}" \
          RUNTIME_ENV_FILE="${RUNTIME_ENV_FILE}" \
          deploy/prod/scripts/deploy.sh

      - name: Show stack status
        if: always()
        shell: bash
        run: |
          docker stack services "${STACK_NAME}" || true
          docker stack ps "${STACK_NAME}" || true
