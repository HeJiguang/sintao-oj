name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  detect-frontend:
    runs-on: ubuntu-latest
    outputs:
      frontend_ready: ${{ steps.check.outputs.frontend_ready }}
    steps:
      - uses: actions/checkout@v4
      - id: check
        name: Detect frontend workspace
        shell: bash
        run: |
          required_files=(
            "frontend/package.json"
            "frontend/package-lock.json"
            "frontend/apps/web/package.json"
            "frontend/apps/app/package.json"
            "frontend/apps/admin/package.json"
          )

          for file in "${required_files[@]}"; do
            if [ ! -f "$file" ]; then
              echo "frontend_ready=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          done

          echo "frontend_ready=true" >> "$GITHUB_OUTPUT"

  java:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - name: Compile Java modules
        run: mvn -q -DskipTests compile

  agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install agent dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ./oj-agent[dev]
      - name: Run agent tests
        run: pytest oj-agent/tests -q

  frontend:
    needs: detect-frontend
    if: needs.detect-frontend.outputs.frontend_ready == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: Run frontend tests
        run: |
          npm run test:ui
          npm run test:api
          npm run test:web
          npm run test:app
          npm run test:admin
      - name: Build frontend apps
        run: |
          npm run build:web
          npm run build:app
          npm run build:admin
