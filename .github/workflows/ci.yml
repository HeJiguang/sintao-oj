name: ci

on:
  push:
    branches:
      - main
      - codex/**
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  java:
    name: Java Compile
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Compile reactor
        run: mvn -q -DskipTests compile

  oj-agent:
    name: Python Agent Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: oj-agent
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: oj-agent/pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Run pytest
        run: pytest -q

  frontend:
    name: Frontend Tests And Builds
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run shared tests
        run: |
          npm run test:ui
          npm run test:api

      - name: Run app tests
        run: npm run test:app

      - name: Run web tests
        run: npm run test:web

      - name: Run admin tests
        run: npm run test:admin

      - name: Build web
        run: npm run build:web

      - name: Build app
        run: npm run build:app

      - name: Build admin
        run: npm run build:admin

  deploy-bundle:
    name: Upload Deploy Bundle
    runs-on: ubuntu-latest
    needs:
      - java
      - oj-agent
      - frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create source bundle
        run: |
          bundle_path="${RUNNER_TEMP}/deploy-source.tar.gz"
          tar \
            --exclude=.git \
            --exclude=.github/.cache \
            -czf "${bundle_path}" \
            .

      - name: Upload source bundle
        uses: actions/upload-artifact@v4
        with:
          name: deploy-source-${{ github.sha }}
          path: ${{ runner.temp }}/deploy-source.tar.gz
          if-no-files-found: error
          retention-days: 3
