name: prod-recover

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Optional image tag override
        required: false
        type: string
      rebuild_images:
        description: Rebuild images on manager before redeploy
        required: false
        default: true
        type: boolean
      sync_worker_images:
        description: Re-sync worker images before redeploy
        required: false
        default: true
        type: boolean

env:
  STACK_NAME: onlineoj-prod
  STACK_ENV_FILE: deploy/prod/env/stack.env
  RUNTIME_ENV_FILE: deploy/prod/env/runtime.env

jobs:
  recover:
    name: Redeploy Production Stack
    runs-on:
      - self-hosted
      - linux
      - x64
      - syncode-prod
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve deploy metadata
        id: meta
        shell: bash
        run: |
          if [[ -n "${{ github.event.inputs.image_tag }}" ]]; then
            image_tag="${{ github.event.inputs.image_tag }}"
          else
            image_tag="manual-${GITHUB_SHA::12}"
          fi
          echo "image_tag=${image_tag}" >> "$GITHUB_OUTPUT"

      - name: Prepare runtime env files
        shell: bash
        run: |
          printf '%s\n' "${{ secrets.STACK_ENV_PROD }}" > "${STACK_ENV_FILE}"
          printf '%s\n' "${{ secrets.RUNTIME_ENV_PROD }}" > "${RUNTIME_ENV_FILE}"
          sed -i "s#sha-REPLACE_ME#${{ steps.meta.outputs.image_tag }}#g" "${STACK_ENV_FILE}"

      - name: Prepare worker SSH key
        if: ${{ github.event.inputs.sync_worker_images == 'true' }}
        shell: bash
        run: |
          mkdir -p .cd-tmp
          printf '%s\n' "${{ secrets.WORKER_SSH_KEY }}" > .cd-tmp/worker_id_ed25519
          chmod 600 .cd-tmp/worker_id_ed25519

      - name: Redeploy locally
        shell: bash
        run: |
          chmod +x deploy/prod/scripts/build-images.sh
          chmod +x deploy/prod/scripts/sync-worker-images.sh
          chmod +x deploy/prod/scripts/deploy.sh
          BUILD_LOCAL_IMAGES=${{ github.event.inputs.rebuild_images }}
          SYNC_WORKER_IMAGES=${{ github.event.inputs.sync_worker_images }}
          BUILD_LOCAL_IMAGES="$BUILD_LOCAL_IMAGES" \
          SYNC_WORKER_IMAGES="$SYNC_WORKER_IMAGES" \
          WORKER_SSH_KEY_FILE=.cd-tmp/worker_id_ed25519 \
          STACK_ENV_FILE="${STACK_ENV_FILE}" \
          RUNTIME_ENV_FILE="${RUNTIME_ENV_FILE}" \
          deploy/prod/scripts/deploy.sh

      - name: Show stack status
        if: always()
        shell: bash
        run: |
          docker stack services "${STACK_NAME}" || true
          docker stack ps "${STACK_NAME}" || true
