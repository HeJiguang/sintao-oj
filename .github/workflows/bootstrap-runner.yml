name: bootstrap-runner

on:
  workflow_dispatch:
    inputs:
      runner_name:
        description: Optional override for the runner name
        required: false
        type: string

permissions:
  contents: read

jobs:
  bootstrap:
    name: Install Self-Hosted Runner
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve metadata
        id: meta
        shell: bash
        run: |
          runner_name="${{ github.event.inputs.runner_name }}"
          if [[ -z "${runner_name}" ]]; then
            runner_name="syncode-prod-101-96-200-76"
          fi
          echo "runner_name=${runner_name}" >> "$GITHUB_OUTPUT"

      - name: Resolve runner package
        id: runner
        shell: bash
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import urllib.request

          with urllib.request.urlopen("https://api.github.com/repos/actions/runner/releases/latest") as response:
              release = json.load(response)

          asset = next(
              item for item in release["assets"]
              if item["name"].startswith("actions-runner-linux-x64-") and item["name"].endswith(".tar.gz")
          )

          print(f"asset_name={asset['name']}")
          print(f"asset_url={asset['browser_download_url']}")
          PY

      - name: Prepare SSH key
        shell: bash
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.DEPLOY_SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Install runner on manager
        shell: bash
        run: |
          archive_name="${{ steps.runner.outputs.asset_name }}"
          archive_url="${{ steps.runner.outputs.asset_url }}"
          runner_name="${{ steps.meta.outputs.runner_name }}"

          ssh -o ServerAliveInterval=15 -o ServerAliveCountMax=40 "${{ secrets.DEPLOY_SSH_USER }}@${{ secrets.DEPLOY_SSH_HOST }}" "\
            set -euo pipefail && \
            mkdir -p ~/onlineoj-runner && \
            cd ~/onlineoj-runner && \
            curl --fail --retry 5 --retry-delay 5 --retry-all-errors -L -C - -o ${archive_name} ${archive_url} && \
            id -u syncode-runner >/dev/null 2>&1 || useradd --create-home --home-dir /opt/syncode-runner --shell /bin/bash syncode-runner && \
            usermod -aG docker syncode-runner || true && \
            command -v git >/dev/null 2>&1 && command -v python3 >/dev/null 2>&1 && command -v mvn >/dev/null 2>&1 || \
              (export DEBIAN_FRONTEND=noninteractive && apt-get update && apt-get install -y git python3 python3-venv maven) && \
            mkdir -p /opt/syncode-runner && \
            tar xzf ~/onlineoj-runner/${archive_name} -C /opt/syncode-runner && \
            chown -R syncode-runner:syncode-runner /opt/syncode-runner && \
            cd /opt/syncode-runner && \
            ./svc.sh stop >/dev/null 2>&1 || true && \
            ./svc.sh uninstall >/dev/null 2>&1 || true && \
            su -s /bin/bash syncode-runner -c \"cd /opt/syncode-runner && ./config.sh --unattended --replace --disableupdate --url https://github.com/${{ github.repository }} --token '${{ secrets.SELF_HOSTED_RUNNER_BOOTSTRAP_TOKEN }}' --name '${runner_name}' --labels syncode-prod --work _work\" && \
            ./svc.sh install syncode-runner && \
            ./svc.sh start && \
            rm -f ~/onlineoj-runner/${archive_name} && \
            ./svc.sh status"
